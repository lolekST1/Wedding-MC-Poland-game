<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wodzirej Karol - Master of the Dancefloor (Demo)</title>
    <!-- Pobieranie silnika Phaser 3 z sieci CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #game-container { border: 4px solid #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player;
let cursors;
let guests;
let score = 0;
let scoreText;
let antiCringe = 100;
let antiCringeText;
let cringyItems;
let gameTimer;
let timeLeft = 30; // 30 sekund na szybką rozgrywkę demo
let timerText;
let gameOver = false;

function preload() {
    // Generujemy grafiki tymczasowe za pomocą Shape'ów, aby kod działał w jednym pliku bez zewnętrznych assetów
}

function create() {
    // Tło - elegancki ciemny parkiet z neonowym obrysem
    this.add.rectangle(400, 300, 800, 600, 0x1a1a2e);
    this.add.grid(400, 300, 760, 560, 40, 40, 0x161625, 1, 0x242444, 0.5);

    // --- GRACZ (Wodzirej Karol) ---
    // Tworzymy elegancki "avatar" Karola (niebieski z muszką)
    player = this.add.container(400, 300);
    let body = this.add.circle(0, 0, 20, 0x0077ff);
    let bowTie1 = this.add.triangle(-5, 0, -10, -5, -10, 5, 0xff0055);
    let bowTie2 = this.add.triangle(5, 0, 10, -5, 10, 5, 0xff0055);
    player.add([body, bowTie1, bowTie2]);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);

    // --- GOŚCIE WESELNI ---
    guests = this.physics.add.group();
    for (let i = 0; i < 8; i++) {
        let x = Phaser.Math.Between(100, 700);
        let y = Phaser.Math.Between(100, 500);
        // Tworzymy smutnego/znudzonego gościa (kolor czerwony)
        let guest = this.add.circle(x, y, 15, 0xff4444);
        guest.isHappy = false;
        guests.add(guest);
        
        // Losowy ruch gości
        this.physics.add.existing(guest);
        guest.body.setVelocity(Phaser.Math.Between(-50, 50), Phaser.Math.Between(-50, 50));
        guest.body.setCollideWorldBounds(true);
        guest.body.setBounce(1);
    }

    // --- PRZESZKODY (Cringe Obiekty, np. przaśne zabawy) ---
    cringyItems = this.physics.add.group();
    this.time.addEvent({
        delay: 3000,
        callback: () => {
            if (gameOver) return;
            let x = Phaser.Math.Between(100, 700);
            let y = Phaser.Math.Between(100, 500);
            let item = this.add.rectangle(x, y, 25, 25, 0x9900ff); // fioletowy "Zły Konkurs"
            cringyItems.add(item);
            this.physics.add.existing(item);
        },
        loop: true
    });

    // --- STEROWANIE ---
    cursors = this.input.keyboard.createCursorKeys();

    // --- INTERFEJS (UI) ---
    scoreText = this.add.text(20, 20, 'Zadowoleni Goście: 0', { fontSize: '20px', fill: '#fff' });
    antiCringeText = this.add.text(20, 50, 'Anti-Cringe Meter: 100%', { fontSize: '20px', fill: '#00ffcc' });
    timerText = this.add.text(620, 20, 'Czas: 30s', { fontSize: '20px', fill: '#ffff00' });

    // --- NAKŁADANIE KOLIZJI ---
    // Gdy Karol podchodzi do gościa -> "animuje go" (rozpala parkiet)
    this.physics.add.overlap(player, guests, animateGuest, null, this);
    // Gdy Karol wpadnie na "cringe" -> traci punkty stylu
    this.physics.add.overlap(player, cringyItems, hitCringe, null, this);

    // Odliczanie czasu
    gameTimer = this.time.addEvent({
        delay: 1000,
        callback: () => {
            timeLeft--;
            timerText.setText('Czas: ' + timeLeft + 's');
            if (timeLeft <= 0) endGame.call(this, true);
        },
        loop: true
    });
}

function update() {
    if (gameOver) return;

    // Ruch gracza (Strzałki)
    player.body.setVelocity(0);

    if (cursors.left.isDown) player.body.setVelocityX(-250);
    else if (cursors.right.isDown) player.body.setVelocityX(250);

    if (cursors.up.isDown) player.body.setVelocityY(-250);
    else if (cursors.down.isDown) player.body.setVelocityY(250);
}

function animateGuest(player, guest) {
    if (!guest.isHappy) {
        guest.isHappy = true;
        guest.setFillStyle(0x00ff66); // Zmienia kolor na zielony (szczęśliwy)
        guest.body.setVelocity(guest.body.velocity.x * 2, guest.body.velocity.y * 2); // Zaczyna szybciej tańczyć
        score += 100;
        scoreText.setText('Zadowoleni Goście: ' + score);
    }
}

function hitCringe(player, item) {
    item.destroy(); // usuń obiekt z mapy
    antiCringe -= 25;
    antiCringeText.setText('Anti-Cringe Meter: ' + antiCringe + '%');
    
    // Efekt wizualny uderzenia
    this.cameras.main.shake(200, 0.01);

    if (antiCringe <= 0) {
        antiCringeText.setText('Anti-Cringe Meter: 0% (Wesele zeppsute!)');
        endGame.call(this, false);
    }
}

function endGame(success) {
    gameOver = true;
    this.physics.pause();
    gameTimer.remove();

    let endMessage = success ? 'SUKCES! Parkiet rozgrzany do czerwoności!' : 'PORAŻKA! Przaśność przejęła wesele...';
    let color = success ? '#00ff66' : '#ff0055';

    this.add.rectangle(400, 300, 600, 300, 0x000000, 0.9).setStrokeStyle(2, 0xd4af37);
    this.add.text(400, 220, endMessage, { fontSize: '22px', fill: color }).setOrigin(0.5);
    this.add.text(400, 280, 'Twój wynik: ' + score + ' punktów', { fontSize: '26px', fill: '#fff' }).setOrigin(0.5);
    
    let cta = this.add.text(400, 360, 'KLIKNIJ TUTAJ, ABY ZAREZERWOWAĆ TERMIN U KAROLA', { 
        fontSize: '16px', 
        fill: '#ffff00', 
        backgroundColor: '#333',
        padding: 10
    }).setOrigin(0.5).setInteractive();

    cta.on('pointerdown', () => {
        window.open('http://www.wodzirejkarol.pl', '_blank');
    });
}
</script>

</body>
</html>
